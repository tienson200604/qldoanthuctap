<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    
    <link rel="stylesheet" href="../../css/styleadmin.css">
    <script src="../../admin/js/main.js"></script>
    <script src="../../admin/js/request.js"></script>
    <script src="../../admin/js/category.js"></script>
    <script>
        window.onload =async function() {
            loadACategory();
        }
    </script>
</head>
<body>

<div id="sidebar"></div>

<header id="top-header"></header>

<div id="main-content">
    <div class="card border-0 shadow-sm p-4">
        <h5 class="fw-bold mb-4">Thêm mới danh mục</h5>
        <div id="userForm">

            <div class="row g-3">
                <div class="col-md-5">
                    <div class="col-md-12">
                        <div class="form-floating form-add-user">
                            <input class="form-control" id="catename" placeholder="Tên danh mục">
                            <label>Tên danh mục</label>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="form-floating form-add-user">
                            <select class="form-select" id="categoryType">
                                <option value="BLOG">Bài viết</option>
                                <option value="DOCUMENT">Tài liệu</option>
                            </select>
                            <label>Chọn loại danh mục</label>
                        </div>
                    </div>
                    <div class="col-md-12 form-add-user">
                        <div class="row">
                            <div class="col-sm-6">
                                <button class="btn btn-primary" onclick="document.getElementById('fileanhdaidientl').click();">
                                    Chọn ảnh
                                </label>
                                <input onchange="chooseAvatar()" type="file" hidden id="fileanhdaidientl">
                            </div>
                            <div class="col-sm-6">
                                <img style="width: 100px;" id="imgpreview">
                            </div>
                        </div>
                    </div>
                    <input class="form-control" id="image" type="hidden">
                </div>
            </div>
            <hr>
            <button onclick="saveCategory()" id="btn-submit" class="btn btn-primary">Lưu danh mục</button>
        </div>
    </div>
</div>
</body>
</html>
