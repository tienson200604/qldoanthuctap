<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <link rel="stylesheet" href="../../css/styleadmin.css">
    <script src="../../admin/js/main.js"></script>
    <script src="../../admin/js/request.js"></script>
    <script src="../../admin/js/semester-teacher.js"></script>
    <script>
        window.onload = async function() {
            await loadSemesterOptions();
            await loadSemesterTypeOptions();
            await loadTeacherSelect();
            await loadASemesterTeacher();
        }
    </script>
</head>
<body>
<div id="sidebar"></div>
<header id="top-header"></header>

<div id="main-content">
    <div class="card border-0 shadow-sm p-4">
        <h5 class="fw-bold mb-4">Cấu hình giảng viên hướng dẫn</h5>

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Đợt thực tập</label>
                <select class="form-select" id="semester" onchange="loadSemesterTypeOptions()"></select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Loại thực tập</label>
                <select class="form-select" id="semesterTypeId"></select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Giảng viên</label>
                <select class="form-select" id="teacherId"></select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Số lượng sinh viên tối đa</label>
                <input type="number" min="1" class="form-control" id="maxStudents" placeholder="Nhập số lượng tối đa">
            </div>
            <div class="col-md-12">
                <label class="form-label">Tên đề tài</label>
                <input type="text" class="form-control" id="projectName" placeholder="Nhập tên đề tài">
            </div>
            <div class="col-md-12">
                <label class="form-label">Mô tả đề tài</label>
                <textarea class="form-control" rows="5" id="descriptionProject" placeholder="Nhập mô tả đề tài"></textarea>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button onclick="saveSemesterTeacher()" id="btn-submit" class="btn btn-primary">Lưu giảng viên hướng dẫn</button>
            <a href="semester-teacher" class="btn btn-outline-secondary">Quay lại</a>
        </div>
    </div>
</div>
</body>
</html>
