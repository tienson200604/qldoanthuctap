        window.onload =async function() {
            await loadNamHoc();
            await loadStatus();
            await loadASemesterType();
            loadTeacher();
        }
    </script>
</head>
<body>

<div id="sidebar"></div>

<header id="top-header"></header>

<div id="main-content">
    <div class="card border-0 shadow-sm p-4">
        <h5 class="fw-bold mb-4">Thêm mới loại thực tập</h5>
        <div id="userForm">

            <div class="row g-3">
                <div class="heading-container">
                    <span class="line"></span>
                    <h2 class="title">Chọn trạng loại thực tập</h2>
                    <span class="line"></span>
                </div>
                <div class="col-md-12">
                    <input type="hidden" id="statusValue">
                    <div id="statusButtons" class="status-container"></div>
                </div>
                <div class="col-md-5">
                    <div class="heading-container">
                        <span class="line"></span>
                        <h2 class="title">Chọn năm học</h2>
                        <span class="line"></span>
                    </div>
                    <div class="col-md-12 form-add-user">
                        <div class="form-floating form-add-user">
                            <select class="form-select" id="semester">
                            </select>
                        </div>
                    </div>
                    <div class="heading-container">
                        <span class="line"></span>
                        <h2 class="title">Chọn ngày kết thúc đăng ký</h2>
                        <span class="line"></span>
                    </div>
                    <div class="form-floating form-add-user">
                        <input class="form-control" type="datetime-local" id="deadlineRegis" placeholder="d">
                        <label>Chọn ngày kết thúc đăng ký</label>
                    </div>
                </div>
                <div class="heading-container">
                    <span class="line"></span>
                    <h2 class="title">Chọn giảng viên</h2>
                    <span class="line"></span>
                </div>
                <select class="form-select" id="teachers" multiple onchange="changeTeacher()">
                </select>
            </div>

            <table class="table mt-5" id="example">
                <thead>
                    <tr>
                        <th style="max-width: 200px;">Giảng viên</th>
                        <th style="max-width: 200px;">Số lượng SV tối đa</th>
                        <th style="max-width: 200px;">Đề tài</th>
                        <th>Mô tả đề tài</th>
                        <th style="max-width: 100px;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="list-giangvien">
                    <!-- <tr>
                        <td style="max-width: 200px;"></td>
                        <td style="max-width: 200px;">
                            <input type="hidden" id="iduser-">
                            <input id="tendetai-" class="form-control">
                        </td>
                        <td><textarea class="form-control" id="motadetai-"></textarea></td>
                        <td style="max-width: 100px;"><button class="btn btn-danger"> X </button></td>
                    </tr> -->
                </tbody>
                <tbody id="list-giangvien-update">

                </tbody>
            </table>
            <hr>
            <button onclick="saveSemesterType()" id="btn-submit" class="btn btn-primary">Lưu loại thực tập</button>
        </div>
    </div>
</div>
