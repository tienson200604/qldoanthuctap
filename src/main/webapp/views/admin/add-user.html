<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <link rel="stylesheet" href="../../css/styleadmin.css">
    <script src="../../admin/js/main.js"></script>
    <script src="../../admin/js/user.js"></script>
    <script>
        window.onload =async function() {
            loadAUser();
        }   
    </script>
</head>
<body>

<div id="sidebar"></div>

<header id="top-header"></header>

<div id="main-content">
    <div class="card border-0 shadow-sm p-4">
    <h5 class="fw-bold mb-4">Thêm mới tài khoản</h5>
    <div id="userForm">

    <input type="hidden" id="userId">

    <div class="row g-3">
        <div class="col-md-2">
            <div class="row">
                <div class="col-6 col-md-12 col-lg-12">
                    <button type="button" id="btnchoosefile" onclick="document.getElementById('fileanhdaidientl').click(); return false;" class="btnchonanh" style="background-image: url('/image/backluuanh.png');">
                        <i class="fa fa-camera camera"></i><br><span class="tieudetaianhdd">Tải ảnh đại diện</span>
                    </button>
                </div>
                <div class="col-6 col-md-12 col-lg-12">
                    <img id="imgpreviewtl" class="imgpreviewtl">
                </div>
                <input onchange="chooseAvatar()" type="file" id="fileanhdaidientl" style="display: none;">
            </div>
            <div class="col-md-12">
                <div class="form-check form-switch">
                    <input type="checkbox" id="actived" class="form-check-input" checked role="switch">
                    <label class="form-check-label" for="actived">
                        Đang hoạt động
                    </label>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="col-md-12">
                <div class="form-floating form-add-user">
                    <input type="email" class="form-control" id="email" placeholder="Email">
                    <label>Email</label>
                </div>
            </div>
            <div class="col-md-12">
                <div class="form-floating form-add-user">
                    <select class="form-select" id="roles">
                        <option value="ROLE_ADMIN">Quản trị viên</option>
                        <option value="ROLE_TEACHER">Giáo viên</option>
                        <option value="ROLE_STUDENT">Sinh viên</option>
                        <option value="ROLE_PARENT">Phụ huynh</option>
                    </select>
                    <label>Chọn quyền</label>
                </div>
            </div>
           <div class="col-md-12">
                <div class="form-floating form-add-user">
                    <input type="password" class="form-control" id="password" placeholder="Password">
                    <label>Password (để trống nếu không đổi)</label>
                </div>
           </div>
            <!-- FullName -->
            <div class="col-md-12">
                <div class="form-floating form-add-user">
                    <input class="form-control" id="fullName" placeholder="Họ tên">
                    <label>Họ tên</label>
                </div>
            </div>
            <!-- Phone -->
            <div class="col-md-12">
                <div class="form-floating form-add-user">
                    <input class="form-control" id="phone" placeholder="Phone">
                    <label>Số điện thoại</label>
                </div>
            </div>
            <div class="col-md-12">
                <div class="form-floating form-add-user">
                    <input class="form-control" id="code" placeholder="Phone">
                    <label>Mã sinh viên/ Mã giảng viên</label>
                </div>
            </div>
            <input class="form-control" id="avatar" type="hidden">
        </div>
        <div class="col-md-5">
        </div>

    </div>
    <hr>



    <button onclick="saveUser()" id="btn-submit" class="btn btn-primary">

        Lưu User

    </button>

</form>
    </div>
</div>

</body>
</html>
