<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <script src="https://cdn.datatables.net/1.13.2/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.2/js/dataTables.bootstrap5.min.js"></script>
    <link href="https://cdn.datatables.net/1.13.2/css/dataTables.bootstrap5.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.2.0/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/styleadmin.css">
    <script src="../../admin/js/main.js"></script>
    <script src="../../admin/js/request.js"></script>
    <script src="../../admin/js/company-semester.js"></script>
    <script>
        window.onload =async function() {
            await loadNamHoc();
            loadCompanys();
            loadCongTyNamHoc();
        }
    </script>
</head>
<body>

<div id="sidebar"></div>

<header id="top-header"></header>

<div id="main-content">
    <div class="card border-0 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold">Quản lý công ty</h5>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    <i class="bi bi-plus-lg"></i> Thêm mới
                </button>
            </div>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <input type="text" id="search" class="form-control" placeholder="Tìm theo tên/email...">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="semester">
                </select>
            </div>
            <div class="col-md-2">
                <button onclick="loadCongTyNamHoc(0)" class="btn btn-outline-secondary w-100"><i class="bi bi-funnel"></i> Lọc</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="example">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Tên công ty</th>
                        <th>Địa chỉ</th>
                        <th>Email</th>
                        <th>Số lượng tối đa</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="list-data">
                </tbody>
            </table>
            <nav class="mt-3">
                <ul id="pagination" class="pagination justify-content-end">
                </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Thêm công ty - Năm học</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
            <label class="fw-bold mb-2">Chọn năm học</label>
            <select class="form-select form-control" id="semester-add">
            </select>
            <label class="fw-bold mb-2 mt-3">Chọn các công ty</label>
            <select class="form-select form-control" id="company" multiple onchange="changeCompany()">
            </select>
            <table class="table table-responsive mt-3">
                <thead class="dark-thead">
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th style="max-width: 150px;">Tên công ty</th>
                        <th style="width: 120px;">SL tối đa</th>
                        <th>Mô tả</th>
                    </tr>
                </thead>
                <tbody id="list-select-company">
                    <!-- <tr>
                        <td><input readonly id="id-company" style="width: 60px;"></td>
                        <td></td>
                        <td><input id="sl-sinhvien" style="width: 70px;"></td>
                        <td><textarea id="mota"></textarea></td>
                    </tr> -->
                </tbody>
            </table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
        <button type="button" class="btn btn-primary" onclick="saveCompanySemester()">Lưu</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editmodal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Cập nhật công ty</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input class="form-control" id="idupdate" type="hidden">
        <div class="form-floating form-add-user">
            <input class="form-control" id="soluongupdate" placeholder="Tên">
            <label>Nhập số lượng sinh viên tối đa</label>
        </div>
        <div class="form-floating form-add-user">
            <textarea class="form-control" id="motaupdate" placeholder="Tên" style="height:250px"></textarea>
            <label>Nhập mô tả</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
        <button type="button" class="btn btn-primary" onclick="updateCompanySemester()">Lưu lại</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
