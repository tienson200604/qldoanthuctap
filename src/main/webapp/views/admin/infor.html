<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link rel="stylesheet" href="../../css/styleadmin.css">
    <script src="../../admin/js/main.js"></script>
    <script src="../../admin/js/infor.js"></script>
</head>
<body>

<div id="sidebar"></div>
<header id="top-header"></header>

<div id="main-content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <h5 class="fw-bold mb-4"><i class="bi bi-person-circle text-primary"></i> Thông tin cá nhân</h5>
            </div>
            
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <div class="position-relative d-inline-block mx-auto mb-3">
                        <img src="/image/default-avatar.jpg" id="avatarPreview" class="rounded-circle border" width="150" height="150" style="object-fit: cover;">
                        <button class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle" onclick="document.getElementById('avatarInput').click()">
                            <i class="bi bi-camera"></i>
                        </button>
                        <input type="file" id="avatarInput" hidden onchange="uploadAvatar()">
                        <input type="hidden" id="avatarUrl">
                    </div>
                    <h6 class="fw-bold mb-0" id="displayFullname">Admin Name</h6>
                    <p class="text-muted small" id="displayUsername">@admin</p>
                    <hr>
                    <div class="text-start">
                        <div class="mb-2"><strong>Email:</strong> <span id="displayEmail">admin@example.com</span></div>
                        <div class="mb-2"><strong>Quyền hạn:</strong> <span class="badge bg-primary">ROLE_ADMIN</span></div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4">
                    <h6 class="fw-bold mb-4">Cập nhật chi tiết</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" id="fullname">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" id="phone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Mã định danh</label>
                            <input type="text" class="form-control bg-light" id="code" readonly disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control bg-light" id="username" readonly disabled>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Địa chỉ Email</label>
                            <input type="email" class="form-control bg-light" id="email" readonly disabled>
                        </div>
                        <div class="col-12 text-end mt-4">
                            <button class="btn btn-primary px-4" id="btnUpdate" onclick="updateProfile()">
                                <i class="bi bi-save me-2"></i>Lưu thay đổi
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        loadMyInfor();
    });
</script>

</body>
</html>
