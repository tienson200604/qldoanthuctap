<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link rel="stylesheet" href="../../css/styleadmin.css">
    <script src="../../admin/js/main.js"></script>
    <script src="../../admin/js/intern-students.js"></script>
</head>
<body>

<div id="sidebar"></div>

<header id="top-header"></header>

<div id="main-content">
    <div class="card border-0 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h5 class="fw-bold mb-0">Danh sách sinh viên thực tập</h5>
            <button class="btn btn-success" onclick="exportInternStudentsExcel()">
                <i class="bi bi-file-earmark-excel"></i> Xuất Excel
            </button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <input type="text" id="search" class="form-control" placeholder="Tìm tên, mã SV, lớp...">
            </div>
            <div class="col-md-3">
                <select id="semesterId" class="form-select"></select>
            </div>
            <div class="col-md-3">
                <select id="internshipType" class="form-select">
                    <option value="">Tất cả hình thức</option>
                    <option value="TAI_TRUONG">Tại trường</option>
                    <option value="DOANH_NGHIEP_LIEN_KET">Doanh nghiệp liên kết</option>
                    <option value="DOANH_NGHIEP_NGOAI">Doanh nghiệp ngoài</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="status" class="form-select">
                    <option value="">Tất cả trạng thái</option>
                    <option value="DANG_CHO">Đang chờ</option>
                    <option value="DANG_THUC_HIEN">Đang thực hiện</option>
                    <option value="DA_HOAN_THANH">Đã hoàn thành</option>
                    <option value="DA_BI_DUOI">Đã bị đuổi</option>
                    <option value="CANH_CAO">Cảnh cáo</option>
                    <option value="TU_CHOI">Từ chối</option>
                </select>
            </div>
            <div class="col-md-1">
                <button class="btn btn-primary w-100" onclick="loadInternStudents(0)">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>STT</th>
                    <th>Họ tên sinh viên</th>
                    <th>Mã sinh viên</th>
                    <th>Lớp</th>
                    <th>Đợt thực tập</th>
                    <th>Hình thức thực tập</th>
                    <th>Giảng viên hướng dẫn</th>
                    <th>Công ty</th>
                    <th>Trạng thái</th>
                    <th>Ngày đăng ký</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody id="list-intern-students"></tbody>
            </table>
        </div>

        <nav class="mt-3">
            <ul id="pagination" class="pagination justify-content-end"></ul>
        </nav>
    </div>
</div>
</body>
</html>
