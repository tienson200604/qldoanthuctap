<!DOCTYPE html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<div id="menu-main" th:fragment="headerUser">
  <header class="main-header">
    <div class="container-fluid">
      <div class="header-wrapper">
        <div class="logo">
          <i class="bi bi-mortarboard-fill"></i>
          <span onclick="window.location.href='/teacher/index'" class="pointer">Internship System</span>
        </div>
        <ul class="main-menu">
          <li>
            <a href="/teacher/index"
               th:classappend="${#httpServletRequest.requestURI == '/teacher/index'} ? 'active'">
              Trang chủ
            </a>
          </li>

          <li>
            <a href="/teacher/blogs"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/blogs')} ? 'active'">
              Thông báo
            </a>
          </li>

          <li>
            <a href="/teacher/documents"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/documents')} ? 'active'">
              Tài nguyên
            </a>
          </li>

          <li>
            <a href="/teacher/company"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/company')} ? 'active'">
              Doanh nghiệp liên kết
            </a>
          </li>

          <li>
            <a href="/teacher/project"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/project')} ? 'active'">
              Quản lý
            </a>
          </li>
        </ul>
        <form class="search-container" action="/teacher/search">
          <i class="bi bi-search"></i>
          <input name="search" type="text" placeholder="Tìm kiếm thông tin..." />
        </form>
        <div class="header-icons">
          <i class="bi bi-moon-fill" id="darkModeToggle" title="Bật/Tắt giao diện tối" style="cursor:pointer; margin-right: 15px;"></i>
          <i class="bi bi-bell"></i>
          <i class="bi bi-person-circle" onclick="window.location.href='/teacher/my-account'"></i>
          <i class="bi bi-box-arrow-right" onclick="window.location.href = '/logout'"></i>
        </div>
      </div>
    </div>
  </header>
  <script>
    let stompClient = null;

    function connectOnline() {
      const socket = new SockJS('/ws');
      stompClient = Stomp.over(socket);
      stompClient.connect({}, function (frame) {
        console.log('Connected: ' + frame);
        stompClient.subscribe('/topic/online', function (message) {
        });
      }, function (error) {
        console.error('Connection socket failed:', error);
        setTimeout(connect, 5000);
      });
    }

    connectOnline();
    
    // Dark mode toggle logic
    document.addEventListener("DOMContentLoaded", function() {
      const darkModeToggle = document.getElementById("darkModeToggle");
      if (darkModeToggle) {
        const isDarkMode = localStorage.getItem("darkMode") === "true";
        if (isDarkMode) {
          document.body.classList.add("dark-mode");
          document.documentElement.setAttribute('data-bs-theme', 'dark');
          darkModeToggle.classList.replace("bi-moon-fill", "bi-sun-fill");
        }
        darkModeToggle.addEventListener("click", function() {
          document.body.classList.toggle("dark-mode");
          const isDark = document.body.classList.contains("dark-mode");
          localStorage.setItem("darkMode", isDark);
          if (isDark) {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
            darkModeToggle.classList.replace("bi-moon-fill", "bi-sun-fill");
          } else {
            document.documentElement.removeAttribute('data-bs-theme');
            darkModeToggle.classList.replace("bi-sun-fill", "bi-moon-fill");
          }
        });
      }
    });
  </script>
</div>
</body>
</html>
