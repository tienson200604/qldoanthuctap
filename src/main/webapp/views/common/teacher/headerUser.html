<!DOCTYPE html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<div id="menu-main" th:fragment="headerUser">
  <header class="main-header">
    <div class="container-fluid">
      <div class="header-wrapper">
        <div class="logo">
          <i class="bi bi-mortarboard-fill"></i>
          <span onclick="window.location.href='/teacher/index'" class="pointer">Internship System</span>
        </div>
        <ul class="main-menu">
          <li>
            <a href="/teacher/index"
               th:classappend="${#httpServletRequest.requestURI == '/teacher/index'} ? 'active'">
              Trang chủ
            </a>
          </li>

          <li>
            <a href="/teacher/blogs"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/blogs')} ? 'active'">
              Thông báo
            </a>
          </li>

          <li>
            <a href="/teacher/documents"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/documents')} ? 'active'">
              Tài nguyên
            </a>
          </li>

          <li>
            <a href="/teacher/company"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/company')} ? 'active'">
              Doanh nghiệp liên kết
            </a>
          </li>

          <li>
            <a href="/teacher/project"
               th:classappend="${#httpServletRequest.requestURI.startsWith('/teacher/project')} ? 'active'">
              Quản lý
            </a>
          </li>
        </ul>
        <form class="search-container" action="/teacher/search">
          <i class="bi bi-search"></i>
          <input name="search" type="text" placeholder="Tìm kiếm thông tin..." />
        </form>
        <div class="header-icons">
          <i class="bi bi-moon-fill" id="darkModeToggle" title="Bật/Tắt giao diện tối" style="cursor:pointer; margin-right: 15px;"></i>
          <div class="dropdown" style="display: inline-block; margin-right: 15px;">
            <i class="bi bi-bell position-relative" id="notificationBell" data-bs-toggle="dropdown" aria-expanded="false" style="cursor:pointer; font-size: 1.2rem;">
              <span id="notificationBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem; display: none;">0</span>
            </i>
            <ul class="dropdown-menu dropdown-menu-end p-0 shadow-sm" aria-labelledby="notificationBell" style="width: 300px; max-height: 400px; overflow-y: auto;">
              <li class="p-3 border-bottom d-flex justify-content-between align-items-center">
                <span class="fw-bold">Thông báo mới</span>
                <a href="#" class="text-primary" style="font-size: 0.8rem; text-decoration: none;" onclick="markAllAsRead(event)">Đánh dấu đã xem</a>
              </li>
              <div id="notificationList">
                <li class="p-3 text-center text-muted small">Không có thông báo nào</li>
              </div>
              <li class="p-2 border-top text-center">
                <a href="/teacher/blogs" class="text-primary small" style="text-decoration: none;">Xem tất cả thông báo</a>
              </li>
            </ul>
          </div>
          <i class="bi bi-person-circle" onclick="window.location.href='/teacher/my-account'"></i>
          <i class="bi bi-box-arrow-right" onclick="window.location.href = '/logout'"></i>
        </div>
      </div>
    </div>
  </header>
  <style>
    .notification-item { cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #f1f1f1; }
    .notification-item:hover { background: #f8f9fa; }
    .notification-item.unread { background: #f0f7ff; }
    .dark-mode .notification-item { border-bottom-color: #333; }
    .dark-mode .notification-item:hover { background: #2c2c2c; }
    .dark-mode .notification-item.unread { background: #1a2a3a; }
  </style>
  <script>
    let stompClient = null;

    function connect() {
      const socket = new SockJS('/ws');
      stompClient = Stomp.over(socket);
      stompClient.connect({}, function (frame) {
        console.log('Connected: ' + frame);
        stompClient.subscribe('/user/queue/notification', function (message) {
            const data = JSON.parse(message.body);
            toastr.info(data.content, data.title);
            fetchNotifications();
        });
      }, function (error) {
        console.error('Connection socket failed:', error);
        setTimeout(connect, 5000);
      });
    }

    async function fetchNotifications() {
        try {
            const [countRes, topRes] = await Promise.all([
                fetch('/api/notification/all/count-noti'),
                fetch('/api/notification/all/top-noti')
            ]);
            
            const count = await countRes.json();
            const topNotis = await topRes.json();
            
            updateBadge(count);
            renderNotifications(topNotis);
        } catch (e) {
            console.error('Failed to fetch notifications', e);
        }
    }

    function updateBadge(count) {
        const badge = document.getElementById('notificationBadge');
        if (count > 0) {
            badge.innerText = count > 99 ? '99+' : count;
            badge.style.display = 'block';
        } else {
            badge.style.display = 'none';
        }
    }

    function renderNotifications(notis) {
        const list = document.getElementById('notificationList');
        if (!notis || notis.length === 0) {
            list.innerHTML = '<li class="p-3 text-center text-muted small">Không có thông báo nào</li>';
            return;
        }
        
        list.innerHTML = notis.map(n => `
            <li class="p-3 notification-item ${n.isRead ? '' : 'unread'}" onclick="window.location.href='${n.link || '#'}'">
                <div class="fw-bold small">${n.title}</div>
                <div class="text-muted" style="font-size: 0.75rem;">${n.title}</div>
                <div class="text-end" style="font-size: 0.65rem; color: #999;">${new Date(n.createdDate).toLocaleDateString('vi-VN')}</div>
            </li>
        `).join('');
    }

    async function markAllAsRead(e) {
        if(e) e.preventDefault();
        try {
            await fetch('/api/notification/all/mark-read', { method: 'POST' });
            fetchNotifications();
        } catch (e) {
            console.error('Failed to mark as read', e);
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        connect();
        fetchNotifications();
    });
    
    // Dark mode toggle logic
    document.addEventListener("DOMContentLoaded", function() {
      const darkModeToggle = document.getElementById("darkModeToggle");
      if (darkModeToggle) {
        const isDarkMode = localStorage.getItem("darkMode") === "true";
        if (isDarkMode) {
          document.body.classList.add("dark-mode");
          document.documentElement.setAttribute('data-bs-theme', 'dark');
          darkModeToggle.classList.replace("bi-moon-fill", "bi-sun-fill");
        }
        darkModeToggle.addEventListener("click", function() {
          document.body.classList.toggle("dark-mode");
          const isDark = document.body.classList.contains("dark-mode");
          localStorage.setItem("darkMode", isDark);
          if (isDark) {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
            darkModeToggle.classList.replace("bi-moon-fill", "bi-sun-fill");
          } else {
            document.documentElement.removeAttribute('data-bs-theme');
            darkModeToggle.classList.replace("bi-sun-fill", "bi-moon-fill");
          }
        });
      }
    });
    
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(() => {
            const firstInput = document.querySelector('input:not([type="hidden"]):not([type="search"]):not([type="checkbox"]):not([type="radio"]):not([type="file"]):not([readonly]):not([disabled]):not([name="search"]):not(#global-search-input), textarea:not([readonly]):not([disabled]), select:not([readonly]):not([disabled])');
            if (firstInput) firstInput.focus();
        }, 500);

        if (typeof $ !== 'undefined') {
            $(document).on('shown.bs.modal', '.modal', function () {
                $(this).find('input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"]):not([type="file"]):not([readonly]):not([disabled]), textarea:not([readonly]):not([disabled]), select:not([readonly]):not([disabled])').first().focus();
            });
        }
    });
  </script>
</div>
</body>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(() => {
            const firstInput = document.querySelector('input:not([type="hidden"]):not([type="search"]):not([type="checkbox"]):not([type="radio"]):not([type="file"]):not([readonly]):not([disabled]):not([name="search"]):not(#global-search-input), textarea:not([readonly]):not([disabled]), select:not([readonly]):not([disabled])');
            if (firstInput) firstInput.focus();
        }, 500);

        if (typeof $ !== 'undefined') {
            $(document).on('shown.bs.modal', '.modal', function () {
                $(this).find('input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"]):not([type="file"]):not([readonly]):not([disabled]), textarea:not([readonly]):not([disabled]), select:not([readonly]):not([disabled])').first().focus();
            });
        }
    });
</script>
</html>
