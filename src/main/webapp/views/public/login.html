<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css" integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <script src="js/user.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <div class="container-fluid h-100">
            <div class="row min-vh-100 align-items-center justify-content-between px-lg-5">
                
                <!-- branding section (Left) -->
                <div class="col-lg-7 d-none d-lg-block text-white pe-5">
                    <div class="branding-content">
                        <h1 class="display-3 fw-bold mb-3 landing-title">University of Economics <br> <span class="text-accent">- Technology for Industries</span></h1>
                        <p class="lead mb-4 opacity-75">Hệ thống quản lý thực tập trực tuyến chuyên nghiệp. <br> Nơi kết nối tri thức và cơ hội nghề nghiệp tương lai.</p>
                        <div class="branding-divider mb-4"></div>
                        <div class="d-flex align-items-center">

                            <div class="ms-3 border-start ps-3 py-1">
                                <p class="mb-0 fw-bold">Trường Đại học</p>
                                <p class="mb-0 small opacity-75 text-uppercase tracking-wider">Kinh tế - Kỹ thuật Công nghiệp</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- login block (Right) -->
                <div class="col-md-8 col-lg-5 col-xl-4 mx-auto me-lg-5">
                    <div class="card login-card p-5">
                        <div class="text-center mb-5">
                            <img src="image/logo_footer.jpg" alt="Logo" class="logo-img-large mb-3">
                        </div>
                        <div class="text-start mb-4">
                            <h4 class="fw-bold system-title mb-1">Đăng nhập</h4>
                            <p class="text-muted small">Vui lòng nhập tài khoản của bạn để tiếp tục</p>
                        </div>

                        <form id="loginForm" action="javascript:login()">
                            <div class="mb-5 text-start">
                                <label for="username" class="form-label fw-bold small text-secondary ms-2">Tên đăng nhập / Email</label>
                                <input type="text" class="form-control pill-input" id="username" required placeholder="Nhập tài khoản">
                            </div>
                            
                            <div class="mb-5 text-start position-relative">
                                <label for="password" class="form-label fw-bold small text-secondary ms-2">Mật khẩu</label>
                                <input type="password" class="form-control pill-input" id="password" required placeholder="Nhập mật khẩu">
                                <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                            </div>

                            <div class="text-end mb-4">
                                <a href="forgot" class="forgot-password text-decoration-none small">Quên mật khẩu?</a>
                            </div>

                            <button type="submit" class="btn btn-login w-100 fw-bold rounded-pill">Đăng nhập</button>
                        </form>
                        
                        <div id="message" class="mt-3 text-center text-danger small"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Logic ẩn/hiện mật khẩu
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('bx-show');
    });

    // Logic xử lý form (giả lập)
    // document.getElementById('loginForm').addEventListener('submit', function(e) {
    //     e.preventDefault();
    //     const user = document.getElementById('username').value;
    //     document.getElementById('message').innerText = "Hệ thống đang bảo trì, vui lòng quay lại sau!";
    // });
</script>


</body>
</html>
