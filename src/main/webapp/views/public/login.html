    />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">

    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <script src="js/user.js"></script>
</head>
<body>
   <div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5 col-xl-4">
                
                <div class="card login-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <img src="image/logo.png" 
                             alt="Logo" class="logo-img mb-3">
                        <h4 class="fw-bold system-title">Hệ thống Quản lý Đồ Án</h4>
                        <p class="text-muted login-subtitle">Đăng nhập</p>
                    </div>

                    <form id="loginForm" action="javascript:login()">
                        <div class="mb-3 input-group-custom">
                            <input type="text" class="form-control" id="username" required placeholder=" ">
                            <label for="username" class="floating-label">Tên đăng nhập / Email</label>
                        </div>
                        
                        <div class="mb-3 input-group-custom position-relative">
                            <input type="password" class="form-control" id="password" required placeholder=" ">
                            <label for="password" class="floating-label">Mật khẩu</label>
                            <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                        </div>

                        <div class="text-end mb-4">
                            <a href="forgot" class="forgot-password text-decoration-none">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn btn-login w-100 fw-bold">Đăng nhập</button>
                    </form>
                    
                    <div id="message" class="mt-3 text-center text-danger small"></div>
                </div> </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Logic ẩn/hiện mật khẩu
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('bx-show');
    });

    // Logic xử lý form (giả lập)

    // });
</script>


</body>
</html>
