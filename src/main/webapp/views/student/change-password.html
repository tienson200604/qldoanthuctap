<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <th:block th:include="common/user/libuser :: libheader"></th:block>
  <script src="/student/js/request.js"></script>
  <script src="/student/js/user.js"></script>
</head>
<body>
<div th:replace="common/user/headerUser :: headerUser"></div>
<div class="account-layout content-page-main">
  <div th:replace="common/user/sidebarUser :: sidebarMain"></div>
  <div class="account-content">
    <div class="account-content-inner">
      <div class="col-sm-5">
        <div class="account-password-box">
          <h5 class="account-password-title">
            <i class="bi bi-key"></i>
            Đổi mật khẩu
          </h5>
          <p class="account-password-desc">
            Để bảo mật tài khoản, vui lòng nhập mật khẩu hiện tại và mật khẩu mới.
          </p>
          <form action="javascript:changePassword()">
            <div class="form-floating mb-3">
              <input type="password" class="form-control account-input" id="currentPassword"
                     placeholder="Mật khẩu hiện tại">
              <label>Mật khẩu hiện tại</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control account-input" id="newPassword" placeholder="Mật khẩu mới">
              <label>Mật khẩu mới</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control account-input" id="confirmPassword"
                     placeholder="Nhập lại mật khẩu">
              <label>Xác nhận mật khẩu</label>
            </div>
            <div class="account-password-rules">
              <div class="account-rule-title">Mật khẩu nên có những yêu cầu sau để bảo mật:</div>
              <ul>
                <li>Ít nhất 8 ký tự</li>
                <li>Có chữ hoa và chữ thường</li>
                <li>Có ít nhất 1 số</li>
              </ul>
            </div>
            <div class="text-end mt-4">
              <button type="submit" class="btn btn-primary account-password-btn">
                <i class="bi bi-shield-lock"></i>
                Cập nhật mật khẩu
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="common/user/footeruser :: footerMain"></div>
</body>
</html>
