<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <th:block th:include="common/user/libuser :: libheader"></th:block>
  <script src="/student/js/request.js"></script>
  <script src="/student/js/log.js"></script>
</head>
<body>
<div th:replace="common/user/headerUser :: headerUser"></div>
<div class="account-layout content-page-main">
  <div th:replace="common/user/sidebarUser :: sidebarMain"></div>
  <div class="account-content">
    <div class="account-content-inner">
      <div class="w-100">
        <div class="card border-0 shadow-sm p-4">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <div>
              <h5 class="fw-bold mb-1">Nhật ký hoạt động</h5>
              <div class="text-muted">Theo dõi các thao tác gần đây của tài khoản của bạn</div>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <input type="text" id="dateRange" class="form-control" placeholder="Chọn khoảng ngày...">
            </div>
            <div class="col-md-4">
              <input type="text" id="search" class="form-control" placeholder="Tìm kiếm theo hành động..." onkeyup="loadMyLogs(0)">
            </div>
            <div class="col-md-2">
              <select id="logLevel" class="form-select" onchange="loadMyLogs(0)">
                <option value="">Tất cả mức độ</option>
                <option value="INFO">INFO</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100" onclick="loadMyLogs(0)">
                <i class="bi bi-filter"></i> Lọc
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
              <tr>
                <th>Thời gian</th>
                <th>Hành động</th>
                <th>Mức độ</th>
              </tr>
              </thead>
              <tbody id="logTableBody"></tbody>
            </table>
          </div>

          <nav class="mt-4">
            <ul class="pagination justify-content-center" id="pagination"></ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="common/user/footeruser :: footerMain"></div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    loadMyLogs(0);
  });

  $(function() {
    $('#dateRange').daterangepicker({
      autoUpdateInput: false,
      locale: {
        format: 'DD/MM/YYYY',
        applyLabel: "Áp dụng",
        cancelLabel: "Xóa",
        daysOfWeek: ["CN", "T2", "T3", "T4", "T5", "T6", "T7"],
        monthNames: ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"]
      }
    });

    $('#dateRange').on('apply.daterangepicker', function(ev, picker) {
      $(this).val(picker.startDate.format('DD/MM/YYYY') + ' - ' + picker.endDate.format('DD/MM/YYYY'));
      loadMyLogs(0);
    });

    $('#dateRange').on('cancel.daterangepicker', function(ev, picker) {
      $(this).val('');
      loadMyLogs(0);
    });
  });
</script>
</body>
</html>
