<!DOCTYPE html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<div th:fragment="rateContent">
  <script src="/student/js/rate.js"></script>
  <div id="evaluationForm">

    <!-- Nhóm 1 -->
    <div class="card mb-4 p-4 shadow-sm border-0 dashboard-admin-card">
      <h5 class="section-title mb-4">1. Tương tác & Hỗ trợ</h5>

      <!-- Câu 1 -->
      <div class="mb-4">
        <label class="form-label fw-semibold text-secondary">
          Giảng viên có phản hồi kịp thời không?
        </label>

        <div class="btn-group w-100 dashboard-admin-radio-group" role="group">
          <input type="radio" class="btn-check" name="q1" id="q1_1" value="1" th:checked="${rate.q1 == 1}" required>
          <label class="btn btn-outline-primary" for="q1_1">1</label>

          <input type="radio" class="btn-check" name="q1" id="q1_2" value="2" th:checked="${rate.q1 == 2}">
          <label class="btn btn-outline-primary" for="q1_2">2</label>

          <input type="radio" class="btn-check" name="q1" id="q1_3" value="3" th:checked="${rate.q1 == 3}">
          <label class="btn btn-outline-primary" for="q1_3">3</label>

          <input type="radio" class="btn-check" name="q1" id="q1_4" value="4" th:checked="${rate.q1 == 4}">
          <label class="btn btn-outline-primary" for="q1_4">4</label>

          <input type="radio" class="btn-check" name="q1" id="q1_5" value="5" th:checked="${rate.q1 == 5}">
          <label class="btn btn-outline-primary" for="q1_5">5</label>
        </div>

        <div class="d-flex justify-content-between small text-muted mt-1">
          <span>Rất chậm</span>
          <span>Rất nhanh</span>
        </div>
      </div>

      <!-- Câu 2 -->
      <div class="mb-4">
        <label class="form-label fw-semibold text-secondary">
          Mức độ hỗ trợ sinh viên
        </label>

        <div class="btn-group w-100 dashboard-admin-radio-group">
          <input type="radio" class="btn-check" name="q2" id="q2_1" value="1" th:checked="${rate.q2 == 1}">
          <label class="btn btn-outline-primary" for="q2_1">1</label>

          <input type="radio" class="btn-check" name="q2" id="q2_2" value="2" th:checked="${rate.q2 == 2}">
          <label class="btn btn-outline-primary" for="q2_2">2</label>

          <input type="radio" class="btn-check" name="q2" id="q2_3" value="3" th:checked="${rate.q2 == 3}">
          <label class="btn btn-outline-primary" for="q2_3">3</label>

          <input type="radio" class="btn-check" name="q2" id="q2_4" value="4" th:checked="${rate.q2 == 4}">
          <label class="btn btn-outline-primary" for="q2_4">4</label>

          <input type="radio" class="btn-check" name="q2" id="q2_5" value="5" th:checked="${rate.q2 == 5}">
          <label class="btn btn-outline-primary" for="q2_5">5</label>
        </div>

        <div class="d-flex justify-content-between small text-muted mt-1">
          <span>Kém</span>
          <span>Rất tốt</span>
        </div>
      </div>

    </div>

    <!-- Nhóm 2 -->
    <div class="card mb-4 p-4 shadow-sm border-0 dashboard-admin-card">
      <h5 class="section-title mb-4">2. Chuyên môn</h5>
    <input type="hidden" th:value="${studentRegisId}" id="studentRegisIdRate">
    <input type="hidden" th:value="${rate.id}" id="idrate">
      <div class="mb-4">
        <label class="form-label fw-semibold text-secondary">
          Chất lượng góp ý chuyên môn
        </label>

        <div class="btn-group w-100 dashboard-admin-radio-group">
          <input type="radio" class="btn-check" name="q3" id="q3_1" value="1"  th:checked="${rate.q3 == 1}">
          <label class="btn btn-outline-primary" for="q3_1">1</label>

          <input type="radio" class="btn-check" name="q3" id="q3_2" value="2" th:checked="${rate.q3 == 2}">
          <label class="btn btn-outline-primary" for="q3_2">2</label>

          <input type="radio" class="btn-check" name="q3" id="q3_3" value="3" th:checked="${rate.q3 == 3}">
          <label class="btn btn-outline-primary" for="q3_3">3</label>

          <input type="radio" class="btn-check" name="q3" id="q3_4" value="4" th:checked="${rate.q3 == 4}">
          <label class="btn btn-outline-primary" for="q3_4">4</label>

          <input type="radio" class="btn-check" name="q3" id="q3_5" value="5" th:checked="${rate.q3 == 5}">
          <label class="btn btn-outline-primary" for="q3_5">5</label>
        </div>

        <div class="d-flex justify-content-between small text-muted mt-1">
          <span>Kém</span>
          <span>Rất tốt</span>
        </div>
      </div>
    </div>

    <!-- Nhóm 3 -->
    <div class="card mb-4 p-4 shadow-sm border-0 dashboard-admin-card">
      <h5 class="section-title mb-3">3. Góp ý thêm</h5>

      <textarea class="form-control dashboard-admin-textarea"
                name="comment"
                rows="4"
                placeholder="Nhập ý kiến của bạn..." th:text="${rate.comment}"></textarea>

      <div class="form-text mt-2 text-danger fst-italic">
        * Đánh giá sẽ được ẩn danh
      </div>
    </div>

    <!-- Button -->
    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-light px-4 fw-bold">
        Hủy
      </button>
      <button onclick="submitEvaluation()" class="btn btn-primary px-5 fw-bold shadow">
        Gửi đánh giá
      </button>
    </div>

  </div>

</div>
</body>
</html>
