<div th:fragment="scoreContent" xmlns:th="http://www.thymeleaf.org">
    <input type="hidden" th:value="${studentRegisId}" id="idStRegisForScore">
    <div class="card p-4 shadow-sm border-0 dashboard-admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="section-title mb-0">Bảng chi tiết điểm số</h5>
            <span class="badge bg-primary fs-6" id="totalScore">Tổng điểm: 0</span>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover table-bordered custom-table">
                <thead class="table-light">
                    <tr>
                        <th class="text-center" style="width: 50px;">STT</th>
                        <th>Đầu điểm</th>
                        <th class="text-center" style="width: 120px;">Trọng số (%)</th>
                        <th class="text-center" style="width: 120px;">Điểm số</th>
                    </tr>
                </thead>
                <tbody id="listScoreStudent">
                    <!-- Sẽ được đổ dữ liệu từ JS -->
                </tbody>
            </table>
        </div>

        <div class="mt-4 p-3 bg-light rounded border border-info" id="notScoredContainer" style="display: none;">
            <p class="mb-2 fw-semibold text-info"><i class="fas fa-info-circle me-2"></i>Các đầu điểm chưa có điểm:</p>
            <div id="listNotScored" class="d-flex gap-2 flex-wrap">
                <!-- Sẽ được đổ từ JS -->
            </div>
        </div>
    </div>
    <script src="/student/js/score-tab.js"></script>
    <script>
        window.addEventListener('load', function() {
            loadMyScores();
        });
    </script>
</div>
