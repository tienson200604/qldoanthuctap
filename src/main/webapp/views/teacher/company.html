<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <th:block th:include="common/user/libuser :: libheader"></th:block>
  <script src="/teacher/js/request.js"></script>
  <script src="/teacher/js/company.js"></script>
  <script>
    window.onload = function (){
      loadCompany(0)
    }
  </script>
</head>
<body>
<div th:replace="common/teacher/headerUser :: headerUser"></div>
<div class="container content-page-main">

  <!-- PAGE TITLE -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-1">Công ty liên kết thực tập</h3>
      <div class="text-muted small">
        Danh sách doanh nghiệp hợp tác với nhà trường
      </div>
    </div>
    <div class="company-total">
      <i class="bi bi-buildings"></i>
      <span id="totalElements"></span> công ty
    </div>
  </div>
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-5">
          <input class="form-control" placeholder="Tìm kiếm công ty..." id="search">
        </div>
        <div class="col-md-4">
          <select class="form-select" id="semester">
            <option th:each="c : ${semesters}" th:value="${c.id}" th:text="'Năm học: '+${c.yearName}">Học kỳ 2 - 2026</option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="loadCompany(0)">
            <i class="bi bi-search"></i>
            Tìm kiếm
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="row g-4" id="list-data">
  </div>
  <nav class="mt-3">
    <ul id="pagination" class="pagination justify-content-center">
    </ul>
  </nav>
</div>
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Giới thiệu công ty <span id="company-name"></span></h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="description-company">
      </div>
    </div>
  </div>
</div>
<div th:replace="common/user/footeruser :: footerMain"></div>
</body>
</html>
