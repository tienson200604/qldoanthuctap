<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Tài nguyên</title>
  <th:block th:include="common/user/libuser :: libheader"></th:block>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/file-icons-js/css/style.css">
  <script src="/teacher/js/request.js"></script>
  <script src="/teacher/js/document.js"></script>
  <script>
    window.onload = function (){
      loadDocument(0)
    }
  </script>
</head>
<body>
<div th:replace="common/teacher/headerUser :: headerUser"></div>
<div class="container py-4">

  <!-- TITLE -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Tài nguyên thực tập</h3>
  </div>

  <!-- FILTER -->
  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <input class="form-control sort-select" placeholder="Tìm kiếm tài liệu..." id="search" onkeyup="loadDocument(0)">
        </div>
        <div class="col-md-3">
          <select class="form-select sort-select" onchange="loadDocument(0)" id="category">
            <option value="">Tất cả danh mục</option>
            <option th:each=" c : ${categories}" th:value="${c.id}" th:text="${c.name}">Tài liệu thực tập</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select sort-select" id="sort" onchange="loadDocument(0)">
            <option value="id,desc">Sắp xếp mới nhất</option>
            <option value="id,asc">Sắxp xếp cũ nhất</option>
            <option value="numView,desc">Sắp xếp nhiều lượt xem</option>
          </select>
        </div>
        <div class="col-md-2"><a href="/teacher/upload-document" class="btn btn-primary sort-select"><i class="fa fa-upload"></i> Upload tài liệu</a></div>

      </div>
    </div>
  </div>

  <!-- LIST DOCUMENT -->
  <div class="row g-4" id="list-data">

  </div>


  <!-- PAGINATION -->
  <nav class="mt-3">
    <ul id="pagination" class="pagination justify-content-center">
    </ul>
  </nav>

</div>
<div th:replace="common/user/footeruser :: footerMain"></div>
</body>
</html>
