<!DOCTYPE html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<div th:fragment="relateDocument">
  <div class="teacher-work-wrapper">
    <div class="teacher-work-header d-flex align-items-center justify-content-between mb-4">
      <button onclick="clearRelate()"
              data-bs-toggle="modal"
              data-bs-target="#modal-add-relate-document"
              class="btn teacher-work-btn-add">
        <i class="bi bi-plus-circle"></i> Thêm yêu cầu nộp giấy tờ liên quan
      </button>
    </div>
    <div id="list-data-relate-document">
    </div>
  </div>

  <input type="hidden" id="totalStudentRelate" th:value="${studentRegis.size()}">
  <div class="modal fade" id="modal-add-relate-document" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Thêm tiến độ công việc</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div>
            <input class="form-control" id="semesterTeacherIdRelate" th:value="${semesterTeacherId}" type="hidden">
            <input class="form-control" id="idRelate" type="hidden">
            <div class="form-floating form-add-user">
              <select class="form-control" id="relate-document-name">
                <option value="Giấy giới thiệu">Giấy giới thiệu</option>
                <option value="Giấy báo cáo nhận xét">Giấy báo cáo nhận xét</option>
                <option value="Đề cương thực tập">Đề cương thực tập</option>
                <option value="Báo cáo word - bản mềm">Báo cáo word - bản mềm</option>
              </select>
              <label>Tên</label>
            </div>
            <div class="form-floating form-add-user mt-4">
              <input class="form-control" id="relate-document-deadline" type="datetime-local" placeholder="Deadline">
              <label>Deadline</label>
            </div>
            <label class="mt-3"><strong>Mô tả nội dung</strong></label>
            <textarea id="contentRelateDocument" class="teacher-project-detail"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          <button onclick="addRelate()" type="button" class="btn btn-primary">Lưu</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    $( document ).ready(function() {
      loadRelate();
    });
  </script>

</div>
</body>
</html>
