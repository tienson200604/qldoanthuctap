<!DOCTYPE html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<div th:fragment="studentList">
    <script src="/teacher/js/student-regis.js"></script>
  <table id="table-student" class="table table-custome">
    <thead>
    <tr>
      <th>Ảnh</th>
      <th>Mã sinh viên</th>
      <th>Họ tên</th>
      <th>Liên lạc</th>
      <th>Công ty đăng ký</th>
      <th>Trạng thái</th>
      <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${studentRegis}">
      <td><img th:src="${c.student.avatar == null || c.student.avatar == ''?'\image\default-avatar.jpg':c.student.avatar}"></td>
      <td th:text="${c.student.code}"></td>
      <td th:text="${c.student.fullname}"></td>
      <td>
        <span class="d-block"><i class="fa fa-phone"></i> <th:block th:text="${c.student.phone}"></th:block></span>
        <span class="d-block"><i class="fa fa-envelope"></i> <th:block th:text="${c.student.email}"></th:block></span>
      </td>
      <td>
        <div th:if="${c.semesterCompany == null}">
            <span class="d-block" th:if="${c.companyName != null && c.companyName != ''}">
              <i class="fa fa-building"></i>
              <th:block th:text="${c.companyName}"></th:block>
            </span>
          <span class="d-block">
              <i class="fa fa-map-marker"></i>
              <th:block th:text="${c.companyAddress}"></th:block>
            </span>
          <span class="d-block"  th:if="${c.companyPhone != null && c.companyPhone != ''}">
              <i class="fa fa-phone"></i>
              <th:block th:text="${c.companyPhone}"></th:block>
            </span>
          <span class="d-block" th:if="${c.companyEmail != null && c.companyEmail != ''}">
              <i class="fa fa-envelope"></i>
              <th:block th:text="${c.companyEmail}"></th:block>
            </span>
        </div>
        <div th:if="${c.semesterCompany != null}">
            <span class="d-block">
              <i class="fa fa-building"></i>
              <th:block th:text="${c.semesterCompany.company}"></th:block>
            </span>
            <span class="d-block">
              <i class="fa fa-map-marker"></i>
              <th:block th:text="${c.semesterCompany.company.address}"></th:block>
            </span>
            <span class="d-block">
              <i class="fa fa-phone"></i>
              <th:block th:text="${c.semesterCompany.company.phone}"></th:block>
            </span>
            <span class="d-block">
              <i class="fa fa-envelope"></i>
              <th:block th:text="${c.semesterCompany.company.email}"></th:block>
            </span>
            <span class="d-block">
              <i class="fa fa-globe"></i>
              <a th:href="${c.semesterCompany.company.website}" target="_blank">
                  <th:block th:text="${c.semesterCompany.company.website}"></th:block>
              </a>
            </span>
        </div>
      </td>
      <td><span th:text="${c.studentRegisStatus.displayName}" class="badge" th:style="'background-color:' + ${c.studentRegisStatus.color}"></span></td>
      <td>
        <a th:href="'/teacher/student-dashboard/'+${c.id}" class="btn btn-sm btn-primary"><i class="fa fa-eye"></i></a>
          <button th:data-student-regis="${c.id}" onclick="acceptStudent(this)" class="btn btn-sm btn-outline-primary" th:if="${c.studentRegisStatus.name == 'DANG_CHO' || c.studentRegisStatus.name == 'DA_BI_DUOI'}">Duyệt</button>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
